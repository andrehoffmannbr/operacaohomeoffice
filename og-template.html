<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Inter';
    font-weight: 400 700;
    src: url('assets/fonts/inter-var.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Sora';
    font-weight: 700 800;
    src: url('assets/fonts/sora-var.woff2') format('woff2');
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background:
      radial-gradient(55% 70% at 88% 20%, rgba(20, 184, 169, 0.35), transparent 65%),
      radial-gradient(40% 60% at 0% 100%, rgba(20, 184, 169, 0.22), transparent 60%),
      linear-gradient(135deg, #083F3B 0%, #0B5C56 55%, #0F766E 100%);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 80px;
    position: relative;
  }
  .content { max-width: 730px; position: relative; z-index: 2; }
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
    font-size: 22px;
    color: #7DD8CE;
    margin-bottom: 28px;
  }
  h1 {
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    font-size: 68px;
    line-height: 1.12;
    letter-spacing: -0.01em;
    margin-bottom: 22px;
  }
  .sub {
    font-size: 30px;
    color: #C9E8E4;
    margin-bottom: 44px;
  }
  .pills { display: flex; gap: 14px; }
  .pill {
    border: 2px solid rgba(255, 255, 255, 0.45);
    background: rgba(255, 255, 255, 0.1);
    border-radius: 999px;
    padding: 12px 26px;
    font-weight: 600;
    font-size: 22px;
  }
  .phone {
    position: absolute;
    right: 90px;
    top: 50%;
    transform: translateY(-50%) rotate(6deg);
    width: 250px;
    height: 500px;
    border-radius: 44px;
    background: #062E2B;
    border: 10px solid rgba(255, 255, 255, 0.85);
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phone::before {
    content: '';
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 8px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.25);
  }
  .play {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play svg { margin-left: 6px; }
</style>
</head>
<body>
  <div class="content">
    <div class="eyebrow">Operação Home Office</div>
    <h1>Sua primeira renda extra em 7 dias</h1>
    <div class="sub">— só com o celular que você já tem</div>
    <div class="pills">
      <span class="pill">Sem anúncio pago</span>
      <span class="pill">Sem CNPJ</span>
      <span class="pill">Sem computador</span>
    </div>
  </div>
  <div class="phone">
    <div class="play">
      <svg viewBox="0 0 24 24" width="44" height="44" fill="#0B5C56"><path d="M8 5v14l11-7z"/></svg>
    </div>
  </div>
</body>
</html>
